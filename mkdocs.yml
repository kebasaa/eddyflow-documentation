site_name: EddyFlow Documentation
site_description: EddyFlow software documentation and physics reference
site_url: https://keba_saa.github.io/eddyflow-documentation/
docs_dir: docs
theme:
  name: material
  logo: assets/app-logo.svg
  favicon: assets/app-logo-mini.svg
  palette:
    primary: blue
    accent: green
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
extra:
  generator_notice: "EddyFlow documentation"
plugins:
  - search
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
extra_css:
  - assets/archive.css
